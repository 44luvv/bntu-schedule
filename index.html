<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050d1a;
    --bg2:      #071224;
    --bg3:      #0a1a32;
    --card:     rgba(10,25,50,0.75);
    --card2:    rgba(5,18,38,0.9);
    --cyan:     #00e5c8;
    --cyan2:    #00c4ab;
    --cyan-dim: rgba(0,229,200,0.12);
    --cyan-glow:rgba(0,229,200,0.25);
    --teal:     #0affdc;
    --text:     #e8f4f2;
    --text2:    #7db8b0;
    --text3:    #3d7a72;
    --border:   rgba(0,229,200,0.15);
    --border2:  rgba(0,229,200,0.08);
    --green:    #00ff88;
    --green-dim:rgba(0,255,136,0.12);
    --orange:   #ff9d3d;
    --orange-dim:rgba(255,157,61,0.12);
    --purple:   #a78bfa;
    --purple-dim:rgba(167,139,250,0.12);
    --red:      #ff5e7d;
    --red-dim:  rgba(255,94,125,0.12);
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html { scroll-behavior:smooth; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── ANIMATED BG ─── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 70% 50% at 80% 20%, rgba(0,229,200,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 10% 80%, rgba(0,180,160,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,229,200,0.03) 0%, transparent 70%);
    pointer-events:none;
  }

  /* Grid lines bg */
  body::after {
    content:'';
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,229,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,200,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
  }

  .z1 { position:relative; z-index:1; }

  /* ─── HEADER ─── */
  .header {
    position:sticky; top:0; z-index:30;
    background: rgba(5,13,26,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
  }

  .header-row {
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px;
  }

  .logo {
    width:36px; height:36px; flex-shrink:0;
    background: linear-gradient(135deg, var(--cyan) 0%, #00b8a0 100%);
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
    box-shadow: 0 0 16px rgba(0,229,200,0.5), 0 0 40px rgba(0,229,200,0.2);
  }

  .header-info { flex:1; }

  .header-title {
    font-family:'Orbitron', sans-serif;
    font-size:15px; font-weight:700;
    letter-spacing:.5px;
    background: linear-gradient(90deg, var(--text) 30%, var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  .header-sub { font-size:10px; color:var(--text3); font-weight:500; margin-top:1px; letter-spacing:.3px; }

  .week-pill {
    font-family:'Orbitron', sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.5px;
    color: var(--cyan);
    background: var(--cyan-dim);
    border: 1px solid var(--border);
    padding:5px 12px; border-radius:20px;
    box-shadow: 0 0 12px var(--cyan-glow);
    flex-shrink:0;
  }

  /* Week tabs */
  .week-tabs { display:flex; gap:0; }

  .week-tab {
    flex:1; padding:9px 0 10px;
    border:none; background:transparent;
    color:var(--text3); font-size:12px; font-weight:700;
    cursor:pointer; position:relative;
    transition:color .2s; font-family:'Exo 2', sans-serif;
    letter-spacing:.3px;
  }

  .week-tab::after {
    content:'';
    position:absolute; bottom:0; left:25%; right:25%;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    border-radius:2px 2px 0 0;
    transform:scaleX(0);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 8px var(--cyan);
  }

  .week-tab.active { color:var(--cyan); }
  .week-tab.active::after { transform:scaleX(1); }

  /* ─── TODAY BANNER ─── */
  #todayBanner { padding:0 16px; margin-top:12px; }

  .today-banner {
    border-radius:16px;
    padding:16px;
    display:flex; align-items:center; gap:14px;
    position:relative; overflow:hidden;
    background: linear-gradient(135deg, rgba(0,30,55,0.95) 0%, rgba(0,20,40,0.95) 100%);
    border: 1px solid rgba(0,229,200,0.3);
    box-shadow: 0 0 30px rgba(0,229,200,0.15), inset 0 1px 0 rgba(0,229,200,0.1);
    animation: bannerIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }

  .today-banner::before {
    content:'';
    position:absolute; top:-40%; right:-10%;
    width:200px; height:200px;
    background: radial-gradient(circle, rgba(0,229,200,0.12) 0%, transparent 70%);
    pointer-events:none;
  }

  @keyframes bannerIn {
    from { opacity:0; transform:translateY(-10px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .banner-icon {
    width:46px; height:46px; flex-shrink:0;
    background: var(--cyan-dim);
    border: 1px solid var(--border);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    box-shadow: 0 0 16px var(--cyan-glow);
  }

  .banner-text { flex:1; }
  .banner-label { font-size:10px; font-weight:700; color:var(--cyan); letter-spacing:.8px; text-transform:uppercase; }
  .banner-day { font-family:'Orbitron',sans-serif; font-size:17px; font-weight:700; color:var(--text); letter-spacing:.3px; margin-top:3px; }
  .banner-meta { font-size:11px; color:var(--text2); font-weight:500; margin-top:3px; }

  .banner-clock-wrap { text-align:right; flex-shrink:0; }
  .banner-clock { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:var(--cyan); letter-spacing:1px; text-shadow:0 0 12px var(--cyan); }
  .banner-date { font-size:10px; color:var(--text3); font-weight:500; margin-top:3px; letter-spacing:.3px; }

  /* ─── DAY SCROLL ─── */
  .day-scroll {
    display:flex; gap:7px; overflow-x:auto;
    padding:12px 16px 0; scrollbar-width:none; scroll-behavior:smooth;
  }
  .day-scroll::-webkit-scrollbar { display:none; }

  .day-tab {
    flex-shrink:0; padding:7px 14px;
    border-radius:10px;
    border: 1px solid var(--border2);
    background: rgba(10,25,50,0.5);
    color:var(--text2); font-size:12px; font-weight:700;
    cursor:pointer; transition:all .2s;
    font-family:'Exo 2',sans-serif; letter-spacing:.2px;
    backdrop-filter: blur(8px);
  }

  .day-tab.active {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 16px var(--cyan-glow), inset 0 0 12px rgba(0,229,200,0.05);
  }

  .day-tab.today-mark {
    border-color: rgba(0,255,136,0.3);
    color: var(--green);
    background: var(--green-dim);
  }

  .day-tab.active.today-mark {
    box-shadow: 0 0 16px rgba(0,255,136,0.3);
  }

  .day-tab:active { transform:scale(.9); }

  /* ─── CONTENT ─── */
  .content { padding:10px 16px 100px; }

  /* Section head */
  .section-head {
    display:flex; align-items:center; gap:8px;
    padding:16px 0 12px;
  }
  .sh-line { flex:1; height:1px; background: linear-gradient(90deg, var(--border2), var(--border), var(--border2)); }
  .sh-label { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:.8px; text-transform:uppercase; white-space:nowrap; }
  .sh-count {
    font-size:10px; font-weight:800; color:var(--cyan);
    background:var(--cyan-dim); border:1px solid var(--border);
    padding:2px 8px; border-radius:10px; letter-spacing:.3px;
  }

  /* ─── EMPTY STATE ─── */
  .empty {
    background: var(--card);
    border:1px dashed var(--border);
    border-radius:16px;
    padding:44px 20px; text-align:center;
    backdrop-filter:blur(8px);
  }
  .empty .big { font-size:44px; margin-bottom:12px; }
  .empty p { font-size:15px; font-weight:700; color:var(--text2); }
  .empty small { font-size:11px; color:var(--text3); margin-top:5px; display:block; }

  /* ─── LESSON CARD ─── */
  .lesson-card {
    background: var(--card);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
    border: 1px solid var(--border2);
    backdrop-filter:blur(12px);
    transition: border-color .2s, box-shadow .2s, transform .15s;
    animation: cardIn .35s ease both;
    position:relative;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .lesson-card:nth-child(1){animation-delay:.05s}
  .lesson-card:nth-child(2){animation-delay:.10s}
  .lesson-card:nth-child(3){animation-delay:.12s}
  .lesson-card:nth-child(4){animation-delay:.15s}
  .lesson-card:nth-child(5){animation-delay:.18s}

  .lesson-card:hover {
    border-color: rgba(0,229,200,0.35);
    box-shadow: 0 0 24px var(--cyan-glow);
    transform: translateY(-2px);
  }

  .lesson-card.current {
    border-color: rgba(0,255,136,0.4);
    box-shadow: 0 0 28px rgba(0,255,136,0.2), 0 0 60px rgba(0,255,136,0.08);
  }

  /* Glowing left bar */
  .lesson-bar {
    position:absolute; left:0; top:0; bottom:0; width:3px;
    border-radius:3px 0 0 3px;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  .card-green  .lesson-bar { background:var(--green);  box-shadow:0 0 8px var(--green); }
  .card-purple .lesson-bar { background:var(--purple); box-shadow:0 0 8px var(--purple); }
  .card-orange .lesson-bar { background:var(--orange); box-shadow:0 0 8px var(--orange); }
  .card-red    .lesson-bar { background:var(--red);    box-shadow:0 0 8px var(--red); }
  .lesson-card.current .lesson-bar { background:var(--green); box-shadow:0 0 12px var(--green); }

  .lesson-inner { padding:13px 14px 13px 18px; }

  .lesson-top { display:flex; align-items:flex-start; gap:12px; }

  .num-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; padding-top:2px; }

  .l-num {
    width:26px; height:26px; border-radius:8px;
    background: var(--cyan-dim); border:1px solid var(--border);
    color:var(--cyan); font-size:11px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif;
    box-shadow:0 0 8px var(--cyan-glow);
  }
  .card-green  .l-num { background:var(--green-dim);  border-color:rgba(0,255,136,0.2);  color:var(--green);  box-shadow:0 0 8px rgba(0,255,136,0.2); }
  .card-purple .l-num { background:var(--purple-dim); border-color:rgba(167,139,250,0.2); color:var(--purple); box-shadow:0 0 8px rgba(167,139,250,0.2); }
  .card-orange .l-num { background:var(--orange-dim); border-color:rgba(255,157,61,0.2);  color:var(--orange); box-shadow:0 0 8px rgba(255,157,61,0.2); }
  .card-red    .l-num { background:var(--red-dim);    border-color:rgba(255,94,125,0.2);  color:var(--red);    box-shadow:0 0 8px rgba(255,94,125,0.2); }
  .lesson-card.current .l-num { background:var(--green-dim); color:var(--green); border-color:rgba(0,255,136,0.3); }

  .l-time { font-size:9px; font-weight:700; color:var(--cyan); letter-spacing:.3px; font-family:'Orbitron',sans-serif; }
  .card-green  .l-time { color:var(--green); }
  .card-purple .l-time { color:var(--purple); }
  .card-orange .l-time { color:var(--orange); }
  .card-red    .l-time { color:var(--red); }
  .lesson-card.current .l-time { color:var(--green); }

  .lesson-main { flex:1; min-width:0; }

  .lesson-name { font-size:13.5px; font-weight:700; color:var(--text); line-height:1.35; margin-bottom:6px; }

  .badges { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }

  .badge {
    font-size:9px; font-weight:800; padding:2px 8px; border-radius:6px;
    letter-spacing:.4px; text-transform:uppercase;
  }
  .b-type { background:var(--cyan-dim); color:var(--cyan); border:1px solid var(--border); }
  .b-group { background:rgba(255,255,255,0.04); color:var(--text2); border:1px solid var(--border2); }
  .b-now { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,255,136,0.2); display:flex; align-items:center; gap:4px; }
  .now-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:glow 1s ease infinite; }
  @keyframes glow { 0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.4;box-shadow:none} }

  /* Progress */
  .progress-wrap { margin-top:7px; }
  .progress-track { height:3px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--cyan)); border-radius:3px; transition:width .5s ease; box-shadow:0 0 6px var(--green); }
  .progress-label { font-size:9px; color:var(--text3); font-weight:600; margin-top:3px; letter-spacing:.3px; }

  /* Details */
  .lesson-details { display:flex; flex-direction:column; gap:5px; margin-top:9px; padding-top:9px; border-top:1px solid var(--border2); }
  .l-detail { display:flex; align-items:flex-start; gap:8px; font-size:11px; color:var(--text2); font-weight:500; line-height:1.4; }
  .d-ic { font-size:12px; flex-shrink:0; }

  /* ─── FOOTER ─── */
  .footer {
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background: rgba(4,10,22,0.92);
    backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    padding:10px 16px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }

  .footer::before {
    content:'';
    position:absolute; left:0; right:0; top:0; height:1px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    opacity:.4;
  }

  .f-time { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:var(--cyan); letter-spacing:1px; text-shadow:0 0 12px var(--cyan); }
  .f-date { font-size:10px; color:var(--text3); font-weight:500; margin-top:2px; letter-spacing:.3px; }
  .f-week-num { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; color:var(--cyan); text-align:right; text-shadow:0 0 12px var(--cyan); }
  .f-week-lbl { font-size:10px; color:var(--text3); font-weight:500; text-align:right; margin-top:2px; letter-spacing:.3px; }
</style>
</head>

const DAYS   = ["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
const DAYS_S = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const START  = new Date("2026-01-19T00:00:00+03:00");
const PAIR_DUR = 95;

function getWeekType(d) {
  return (Math.floor(Math.floor((d - START) / 86400000) / 7) % 2) + 1;
}

function cardColor(n) {
  n = n.toLowerCase();
  if (n.includes("физическ") && n.includes("культ")) return "card-green";
  if (n.includes("математик") || n.includes("анализ")) return "card-purple";
  if (n.includes("политэкон") || n.includes("деньги") || (n.includes("орг") && n.includes("функц"))) return "card-orange";
  if (n.includes("духовн") || n.includes("нравств")) return "card-red";
  return "";
}

function lessonEmoji(n) {
  n = n.toLowerCase();
  if (n.includes("физическ") && n.includes("культ")) return "🏃";
  if (n.includes("иностранный") || n.includes("язык")) return "🌐";
  if (n.includes("математик")) return "📐";
  if (n.includes("физика")) return "⚗️";
  if (n.includes("операционн")) return "💻";
  if (n.includes("алгоритмизац")) return "🖥️";
  if (n.includes("эвм") || (n.includes("орг") && n.includes("функц"))) return "📟";
  if (n.includes("политэкон") || n.includes("деньги")) return "💰";
  if (n.includes("инженерн")) return "📏";
  if (n.includes("духовн") || n.includes("нравств")) return "🕊️";
  return "📚";
}

let now = new Date();
let curWeek = getWeekType(now);
let curDay  = now.getDay() === 0 ? 6 : now.getDay() - 1;
if (curDay > 5) curDay = 0;
let selWeek = curWeek, selDay = curDay;

function getCurLesson(lessons) {
  const cur = now.getHours()*60 + now.getMinutes();
  for (let l of lessons) {
    const [lh,lm] = l.time.split(":").map(Number);
    const s = lh*60+lm;
    if (cur>=s && cur<s+PAIR_DUR) return {lesson:l, elapsed:cur-s};
  }
  return null;
}

function getNextLesson(lessons) {
  const cur = now.getHours()*60 + now.getMinutes();
  for (let l of lessons) {
    const [lh,lm] = l.time.split(":").map(Number);
    if (lh*60+lm > cur) return l;
  }
  return null;
}

function renderBanner() {
  const el = document.getElementById("todayBanner");
  const isToday = selDay===curDay && selWeek===curWeek;
  if (!isToday) { el.innerHTML=""; return; }
  const lessons = (SCHEDULE[selWeek]||{})[selDay]||[];
  const cr = getCurLesson(lessons);
  const nx = getNextLesson(lessons);
  let meta = "";
  if (cr) meta = `🟢 Сейчас: ${cr.lesson.name.split(" ").slice(0,3).join(" ")}…`;
  else if (nx) meta = `⏰ Следующая: ${nx.time} — ${nx.name.split(" ").slice(0,3).join(" ")}…`;
  else if (lessons.length) meta = "✅ Все пары завершены";
  else meta = "🎉 Пар нет — свободен!";

  el.innerHTML = `<div class="today-banner">
    <div class="banner-icon">📅</div>
    <div class="banner-text">
      <div class="banner-label">Сегодня · Today</div>
      <div class="banner-day">${DAYS[selDay]}</div>
      <div class="banner-meta">${meta}</div>
    </div>
    <div class="banner-clock-wrap">
      <div class="banner-clock" id="bannerClock">--:--</div>
      <div class="banner-date" id="bannerDate">-</div>
    </div>
  </div>`;
  updateBannerTime();
}

function updateBannerTime() {
  const c=document.getElementById("bannerClock"), d=document.getElementById("bannerDate");
  if(!c) return;
  c.textContent = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  const dn=["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"];
  const mn=["ЯНВ","ФЕВ","МАР","АПР","МАЙ","ИЮН","ИЮЛ","АВГ","СЕН","ОКТ","НОЯ","ДЕК"];
  d.textContent = dn[now.getDay()]+" "+now.getDate()+" "+mn[now.getMonth()];
}

function renderDayTabs() {
  const sc = document.getElementById("dayScroll"); sc.innerHTML="";
  for (let i=0;i<=5;i++) {
    const iT=i===curDay&&selWeek===curWeek, iA=i===selDay;
    const b=document.createElement("button");
    b.className="day-tab"+(iA?" active":"")+(iT?" today-mark":"");
    b.textContent=DAYS_S[i]+(iT?" ·":"");
    b.onclick=()=>{selDay=i;render();};
    sc.appendChild(b);
  }
  const a=sc.querySelector(".active");
  if(a) setTimeout(()=>a.scrollIntoView({inline:"center",behavior:"smooth"}),100);
}

function renderContent() {
  const cont=document.getElementById("content");
  const lessons=(SCHEDULE[selWeek]||{})[selDay]||[];
  const isToday=selDay===curDay&&selWeek===curWeek;
  const cr=isToday?getCurLesson(lessons):null;
  const curL=cr?cr.lesson:null;

  let h=`<div class="section-head">
    <div class="sh-line"></div>
    <div class="sh-label">${DAYS[selDay]} · ${selWeek}-Я НЕДЕЛЯ</div>
    ${lessons.length?`<div class="sh-count">${lessons.length} ПАР${lessons.length===1?"А":lessons.length<5?"Ы":""}</div>`:""}
    <div class="sh-line"></div>
  </div>`;

  if (!lessons.length) {
    h+=`<div class="empty"><div class="big">🎉</div><p>Пар нет — отдыхаем!</p><small>Используй время продуктивно</small></div>`;
  } else {
    lessons.forEach((l,i)=>{
      const isCur=curL===l;
      const cc=cardColor(l.name);
      const em=lessonEmoji(l.name);
      const meta=[l.type,l.group].filter(Boolean).join(" · ");
      const tls=l.teacher?l.teacher.split("\n"):[];

      let det="";
      if(tls.length||l.room){
        det=`<div class="lesson-details">`;
        tls.forEach(t=>{det+=`<div class="l-detail"><span class="d-ic">👤</span><span>${t}</span></div>`;});
        if(l.room)det+=`<div class="l-detail"><span class="d-ic">📍</span><span>${l.room}</span></div>`;
        det+=`</div>`;
      }

      let prog="";
      if(isCur){
        const pct=Math.min(100,Math.round((cr.elapsed/PAIR_DUR)*100));
        prog=`<div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">ОСТАЛОСЬ ${PAIR_DUR-cr.elapsed} МИН · ${pct}% ПРОШЛО</div>
        </div>`;
      }

      h+=`<div class="lesson-card ${cc}${isCur?" current":""}">
        <div class="lesson-bar"></div>
        <div class="lesson-inner">
          <div class="lesson-top">
            <div class="num-col">
              <div class="l-num">${i+1}</div>
              <div class="l-time">${l.time}</div>
            </div>
            <div class="lesson-main">
              <div class="lesson-name">${em} ${l.name}</div>
              <div class="badges">
                ${meta?`<span class="badge b-type">${meta}</span>`:""}
                ${isCur?`<span class="badge b-now"><span class="now-dot"></span>LIVE</span>`:""}
              </div>
              ${prog}${det}
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  cont.innerHTML=h;
}

function selectWeek(w) {
  selWeek=w; selDay=(w===curWeek)?curDay:0;
  document.getElementById("wTab1").className="week-tab"+(w===1?" active":"");
  document.getElementById("wTab2").className="week-tab"+(w===2?" active":"");
  render();
}

function render() { renderBanner(); renderDayTabs(); renderContent(); }

function updateClock() {
  now=new Date();
  const h=String(now.getHours()).padStart(2,"0"), m=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("footerTime").textContent=h+":"+m;
  const dn=["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"];
  const mn=["ЯНВ","ФЕВ","МАР","АПР","МАЙ","ИЮН","ИЮЛ","АВГ","СЕН","ОКТ","НОЯ","ДЕК"];
  document.getElementById("footerDate").textContent=dn[now.getDay()]+" "+now.getDate()+" "+mn[now.getMonth()];
  const wt=getWeekType(now);
  document.getElementById("footerWeekNum").textContent=wt+"-Я";
  document.getElementById("weekPill").textContent="WEEK "+wt;
  updateBannerTime();
}

if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

updateClock();
selectWeek(selWeek);
setInterval(()=>{ updateClock(); renderContent(); }, 10000);
</script>
