<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>БНТУ · Расписание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════ */
:root {
  /* palette */
  --bg:       #020810;
  --surface:  rgba(4,12,26,0.82);
  --surface2: rgba(6,16,34,0.60);

  --c:    #00edB4;
  --c2:   #00c89a;
  --c3:   #009e78;
  --cdim: rgba(0,237,180,0.08);
  --cg1:  rgba(0,237,180,0.20);
  --cg2:  rgba(0,237,180,0.42);

  --teal: #00cce0;

  --green:  #00ff8c;
  --g-dim:  rgba(0,255,140,0.08);
  --g-glow: rgba(0,255,140,0.24);

  --purple: #b48aff;
  --p-dim:  rgba(180,138,255,0.09);
  --orange: #ffaa3d;
  --o-dim:  rgba(255,170,61,0.09);
  --red:    #ff5e7d;
  --r-dim:  rgba(255,94,125,0.09);

  --ink:    #d8ede8;
  --ink2:   rgba(216,237,232,0.55);
  --ink3:   rgba(216,237,232,0.32);
  --muted:  #3a7468;
  --muted2: #1c4840;

  --stroke:  rgba(0,237,180,0.11);
  --stroke2: rgba(0,237,180,0.055);

  /* motion */
  --spring: cubic-bezier(.22,1,.36,1);
  --snap:   cubic-bezier(.34,1.56,.64,1);
  --ease:   cubic-bezier(.4,0,.2,1);

  /* radii */
  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  20px;
  --r-pill:100px;
}

/* ════════════════════════════════════════════
   RESET
════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html { scroll-behavior:auto }
body {
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ════════════════════════════════════════════
   BACKGROUND
════════════════════════════════════════════ */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -8%,  rgba(0,237,180,.052) 0%, transparent 62%),
    radial-gradient(ellipse 55% 55% at 108% 52%,  rgba(0,204,224,.035) 0%, transparent 58%),
    radial-gradient(ellipse 48% 44% at -8%  82%,  rgba(0,237,180,.028) 0%, transparent 58%);
  animation: bgPulse 16s ease-in-out infinite;
}
@keyframes bgPulse { 0%,100%{opacity:.7} 50%{opacity:1} }

body::after {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,237,180,.011) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,237,180,.011) 1px, transparent 1px);
  background-size:58px 58px;
  opacity:.65;
}

/* drifting orb */
.orb {
  position:fixed; z-index:0; pointer-events:none;
  border-radius:50%; filter:blur(100px);
  background:radial-gradient(circle, rgba(0,237,180,.038) 0%, transparent 70%);
  width:480px; height:480px; top:5%; left:-100px;
  animation:orbDrift 24s ease-in-out infinite;
}
@keyframes orbDrift {
  0%  { transform:translate(0,   0) }
  25% { transform:translate(70px, 90px) }
  50% { transform:translate(25px,185px) }
  75% { transform:translate(-35px, 90px) }
  100%{ transform:translate(0,   0) }
}

.z { position:relative; z-index:1 }

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
.hdr {
  position:sticky; top:0; z-index:40;
  background:rgba(2,8,16,.92);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--stroke);
  padding:14px 18px 0;
  animation:hdrIn .6s var(--spring) both;
}
@keyframes hdrIn { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }

/* header top row */
.hrow {
  display:flex; align-items:center; gap:13px;
  margin-bottom:15px;
}

.logo {
  width:37px; height:37px; flex-shrink:0;
  border-radius:10px;
  background:linear-gradient(145deg, var(--c) 0%, var(--teal) 100%);
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
  box-shadow:0 0 0 1px rgba(0,237,180,.25), 0 0 18px var(--cg1);
  animation:logoPulse 5s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow:0 0 0 1px rgba(0,237,180,.25), 0 0 14px var(--cg1) }
  50%     { box-shadow:0 0 0 1px rgba(0,237,180,.40), 0 0 28px var(--cg2) }
}

.htitle {
  font-family:'Orbitron',sans-serif;
  font-size:15px; font-weight:700; letter-spacing:.25px;
  background:linear-gradient(100deg,#fff 15%, var(--c) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.hsub {
  font-size:9.5px; color:var(--muted);
  font-weight:500; letter-spacing:.6px;
  margin-top:2px; text-transform:uppercase;
}

/* week pill */
.wpill {
  font-family:'Orbitron',sans-serif;
  font-size:9.5px; font-weight:700; letter-spacing:.35px;
  color:var(--c);
  background:var(--cdim);
  border:1px solid var(--stroke);
  padding:5px 13px; border-radius:var(--r-pill);
  white-space:nowrap; flex-shrink:0;
  box-shadow:0 0 0 0 transparent;
  position:relative; overflow:hidden;
  transition:box-shadow .5s;
}
.wpill::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(0,237,180,.18) 45%,
    rgba(0,237,180,.28) 55%,
    transparent 100%);
  transform:translateX(-120%);
  animation:pillBeam 5s ease-in-out infinite;
}
@keyframes pillBeam { 0%,50%{transform:translateX(-120%)} 100%{transform:translateX(200%)} }

/* week tabs */
.wtabs { display:flex; }
.wtab {
  flex:1; padding:9px 0 11px;
  border:none; background:transparent;
  font-family:'Exo 2',sans-serif;
  font-size:11.5px; font-weight:700; letter-spacing:.45px;
  color:var(--muted2); cursor:pointer;
  position:relative; transition:color .3s; text-transform:uppercase;
}
.wtab::after {
  content:''; position:absolute; bottom:0; left:14%; right:14%; height:2px;
  background:linear-gradient(90deg, transparent, var(--c), transparent);
  border-radius:2px 2px 0 0;
  transform:scaleX(0); transform-origin:center;
  transition:transform .45s var(--snap);
}
.wtab.active { color:var(--c) }
.wtab.active::after { transform:scaleX(1) }
.wtab:active { opacity:.65; transition:opacity .08s }

/* ════════════════════════════════════════════
   BANNER
════════════════════════════════════════════ */
#bWrap { padding:0 15px; margin-top:14px; }

.bnr {
  position:relative; overflow:hidden;
  border-radius:var(--r-lg);
  padding:15px 16px;
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg,
    rgba(0,237,180,.07) 0%,
    rgba(0,204,224,.04) 55%,
    rgba(0,237,180,.02) 100%);
  border:1px solid rgba(0,237,180,.20);
  backdrop-filter:blur(18px);
  box-shadow:0 4px 32px rgba(0,0,0,.45), 0 1px 0 rgba(0,237,180,.08) inset;
  animation:fadeUp .5s var(--spring) both;
}

/* top edge highlight */
.bnr::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 5%, rgba(0,237,180,.5) 50%, transparent 95%);
  animation:edgeShim 7s ease-in-out infinite;
}
@keyframes edgeShim { 0%,100%{opacity:.4} 50%{opacity:.85} }

/* subtle radial corner glow */
.bnr::after {
  content:''; position:absolute; top:-40px; right:-30px;
  width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle, rgba(0,237,180,.07) 0%, transparent 70%);
  pointer-events:none;
  animation:cornerPulse 8s ease-in-out infinite;
}
@keyframes cornerPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }

.bicon  { width:44px;height:44px;flex-shrink:0;border-radius:var(--r-md);background:var(--cdim);border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-size:22px }
.blicon {
  width:44px;height:44px;flex-shrink:0;border-radius:var(--r-md);
  background:var(--g-dim);border:1px solid rgba(0,255,140,.18);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  animation:liveIconPulse 2.8s ease-in-out infinite;
}
@keyframes liveIconPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

.bbody { flex:1; min-width:0 }

.bchip {
  display:inline-flex; align-items:center; gap:5px;
  font-size:8.5px; font-weight:800; letter-spacing:.75px; text-transform:uppercase;
  color:var(--c); background:var(--cdim);
  border:1px solid var(--stroke);
  padding:2px 8px 2px 7px; border-radius:5px;
  margin-bottom:6px;
}
.bchip.live { color:var(--green); background:var(--g-dim); border-color:rgba(0,255,140,.18) }

.bday {
  font-family:'Orbitron',sans-serif;
  font-size:15px; font-weight:700; color:var(--ink); line-height:1.1;
}
.bmeta {
  font-size:11px; color:var(--ink3);
  font-weight:500; margin-top:5px; line-height:1.5;
}
.bmeta b { color:var(--c); font-weight:700 }
.bmeta.gm b { color:var(--green) }

.bright { flex-shrink:0; text-align:right }
.bclock {
  font-family:'Orbitron',sans-serif;
  font-size:22px; font-weight:900; letter-spacing:1px;
  color:var(--c); line-height:1;
  text-shadow:0 0 14px var(--cg2);
}
.bdate {
  font-size:8.5px; color:var(--muted);
  font-weight:600; letter-spacing:.5px;
  text-transform:uppercase; margin-top:5px;
}

/* banner progress */
.bprog { margin-top:10px }
.bptrack {
  height:2px; background:rgba(0,255,140,.10);
  border-radius:2px; overflow:hidden;
}
.bpfill {
  height:100%;
  background:linear-gradient(90deg, var(--green), var(--c));
  border-radius:2px;
  transition:width 1.4s var(--ease);
  position:relative; overflow:hidden;
}
.bpfill::after {
  content:''; position:absolute; top:0; left:-120%; width:55%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.38), transparent);
  animation:barBeam 2.8s ease-in-out infinite;
}
@keyframes barBeam { 0%{left:-120%} 100%{left:220%} }
.bplbl {
  font-size:8.5px; color:var(--green);
  font-weight:700; letter-spacing:.25px; margin-top:5px;
}

/* ════════════════════════════════════════════
   DAY TABS
════════════════════════════════════════════ */
.dscroll {
  display:flex; gap:6px;
  overflow-x:auto; padding:13px 15px 0;
  scrollbar-width:none;
}
.dscroll::-webkit-scrollbar { display:none }

.dtab {
  flex-shrink:0; min-width:42px;
  padding:7px 12px; border-radius:var(--r-sm);
  border:1px solid var(--stroke2);
  background:var(--surface2);
  color:var(--muted); font-size:11.5px; font-weight:700;
  font-family:'Exo 2',sans-serif; letter-spacing:.3px; cursor:pointer;
  transition:
    color         .3s var(--spring),
    border-color  .3s var(--spring),
    background    .3s var(--spring),
    box-shadow    .3s var(--spring),
    transform     .3s var(--spring);
  backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; gap:4px;
  position:relative; overflow:hidden;
  animation:fadeUp .45s var(--spring) both;
}
/* shimmer on hover */
.dtab::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(145deg, rgba(0,237,180,.06), transparent 60%);
  opacity:0; transition:opacity .3s;
}
.dtab:hover::before  { opacity:1 }
.dtab:hover {
  border-color:rgba(0,237,180,.20);
  color:rgba(0,237,180,.70);
  transform:translateY(-1px);
}
.dtab .dn { font-size:11.5px; font-weight:700; position:relative; z-index:1 }
.dtab .dd {
  width:3px; height:3px; border-radius:50%;
  background:var(--muted2);
  transition:all .35s var(--spring);
  position:relative; z-index:1;
}

/* active */
.dtab.active {
  background:rgba(0,237,180,.09);
  border-color:rgba(0,237,180,.35);
  color:var(--c);
  box-shadow:0 0 16px rgba(0,237,180,.13), 0 0 1px rgba(0,237,180,.3) inset;
  transform:translateY(-3px) scale(1.04);
}
.dtab.active .dd { background:var(--c); box-shadow:0 0 7px var(--c) }

/* today */
.dtab.today-mark { border-color:rgba(0,255,140,.26); color:var(--green); background:rgba(0,255,140,.06) }
.dtab.today-mark .dd { background:var(--green); box-shadow:0 0 6px var(--green); animation:dotBlink 2s ease infinite }
.dtab.active.today-mark {
  border-color:rgba(0,255,140,.38);
  box-shadow:0 0 16px rgba(0,255,140,.16), 0 0 1px rgba(0,255,140,.3) inset;
}
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:.15} }
.dtab:active { transform:scale(.87)!important; transition:transform .08s }

/* ════════════════════════════════════════════
   CONTENT AREA
════════════════════════════════════════════ */
.content { padding:6px 15px 120px }

.shead {
  display:flex; align-items:center; gap:10px;
  padding:16px 0 12px;
}
.sline {
  flex:1; height:1px;
  background:linear-gradient(90deg, transparent, var(--stroke), transparent);
}
.slbl {
  font-size:9.5px; font-weight:800; color:var(--muted);
  letter-spacing:.8px; text-transform:uppercase; white-space:nowrap;
}
.scnt {
  font-size:8.5px; font-weight:800; color:var(--c);
  background:var(--cdim); border:1px solid var(--stroke);
  padding:2px 9px; border-radius:var(--r-pill); letter-spacing:.35px;
  animation:cntPop .45s var(--snap) both .08s;
}
@keyframes cntPop { from{opacity:0;transform:scale(.45)} to{opacity:1;transform:scale(1)} }

/* ── empty ── */
.empty {
  margin-top:8px;
  background:var(--surface); border:1px dashed var(--stroke);
  border-radius:var(--r-lg); padding:52px 20px;
  text-align:center; backdrop-filter:blur(12px);
  animation:fadeUp .5s var(--spring) both;
}
.eemoji { font-size:50px; margin-bottom:14px; display:block; animation:floatEmoji 4s ease-in-out infinite }
@keyframes floatEmoji { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
.etitle { font-size:15px; font-weight:800; color:var(--ink); margin-bottom:6px }
.esub   { font-size:11.5px; color:var(--muted); font-weight:500 }

/* ════════════════════════════════════════════
   LESSON CARD
════════════════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.lcard {
  position:relative;
  background:var(--surface);
  border-radius:var(--r-lg);
  margin-bottom:9px;
  overflow:hidden;
  border:1px solid var(--stroke2);
  backdrop-filter:blur(16px);
  transition:
    border-color  .4s var(--ease),
    box-shadow    .4s var(--ease),
    transform     .3s var(--spring);
  animation:fadeUp .55s var(--spring) both;
}

/* top-left inner glow that fades in on hover */
.lcard::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(135deg, rgba(0,237,180,.045) 0%, transparent 50%);
  opacity:0; transition:opacity .45s;
}
.lcard:hover::before { opacity:1 }
.lcard:hover {
  border-color:rgba(0,237,180,.24);
  box-shadow:0 0 24px rgba(0,237,180,.09), 0 10px 28px rgba(0,0,0,.60);
  transform:translateY(-3px);
}
.lcard:active { transform:scale(.974)!important; transition:transform .08s }

/* ── current lesson ── */
.lcard.cur {
  border-color:rgba(0,255,140,.30);
  box-shadow:0 0 32px rgba(0,255,140,.14), 0 10px 36px rgba(0,0,0,.65);
  animation:fadeUp .55s var(--spring) both, curBreath 5s ease-in-out infinite 1.2s;
}
@keyframes curBreath {
  0%,100% { box-shadow:0 0 32px rgba(0,255,140,.14), 0 10px 36px rgba(0,0,0,.65) }
  50%     { box-shadow:0 0 48px rgba(0,255,140,.24), 0 10px 36px rgba(0,0,0,.65) }
}

/* ── left accent bar ── */
.lbar {
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg, var(--c) 0%, var(--c2) 100%);
}
/* travelling glow bead */
.lbar::after {
  content:''; position:absolute;
  left:-4px; top:-25%; width:11px; height:45%;
  background:rgba(0,237,180,.60); filter:blur(5px); border-radius:50%;
  animation:beadTravel 4.2s ease-in-out infinite;
}
.ccg .lbar               { background:linear-gradient(180deg, var(--green), #00cc70) }
.ccg .lbar::after        { background:rgba(0,255,140,.60); animation-duration:3.6s }
.ccp .lbar               { background:linear-gradient(180deg, var(--purple), #9060e0) }
.ccp .lbar::after        { background:rgba(180,138,255,.60); animation-duration:4.8s; animation-delay:.5s }
.cco .lbar               { background:linear-gradient(180deg, var(--orange), #e08010) }
.cco .lbar::after        { background:rgba(255,170,61,.60); animation-duration:4.2s; animation-delay:1s }
.ccr .lbar               { background:linear-gradient(180deg, var(--red), #d02858) }
.ccr .lbar::after        { background:rgba(255,94,125,.60); animation-duration:3.9s; animation-delay:.3s }
.lcard.cur .lbar         { background:linear-gradient(180deg, var(--green), #00cc70) }
.lcard.cur .lbar::after  { background:rgba(0,255,140,.75); animation-duration:2.2s }
@keyframes beadTravel { 0%{top:-25%} 100%{top:110%} }

/* ── card body ── */
.lbody { padding:13px 14px 13px 17px; position:relative; z-index:1 }
.ltop  { display:flex; align-items:flex-start; gap:13px }

/* number + time column */
.lnc {
  display:flex; flex-direction:column; align-items:center;
  gap:5px; flex-shrink:0; padding-top:1px;
}
.lnum {
  width:27px; height:27px; border-radius:var(--r-sm);
  display:flex; align-items:center; justify-content:center;
  font-family:'Orbitron',sans-serif; font-size:10.5px; font-weight:700;
  background:var(--cdim); color:var(--c); border:1px solid var(--stroke);
  transition:transform .35s var(--spring), box-shadow .35s var(--ease);
}
.lcard:hover .lnum { transform:scale(1.13) rotate(-5deg); box-shadow:0 0 14px var(--cg1) }

.ccg .lnum { background:var(--g-dim);  color:var(--green);  border-color:rgba(0,255,140,.16) }
.ccp .lnum { background:var(--p-dim);  color:var(--purple); border-color:rgba(180,138,255,.16) }
.cco .lnum { background:var(--o-dim);  color:var(--orange); border-color:rgba(255,170,61,.16) }
.ccr .lnum { background:var(--r-dim);  color:var(--red);    border-color:rgba(255,94,125,.16) }
.lcard.cur .lnum { background:var(--g-dim); color:var(--green); border-color:rgba(0,255,140,.22) }

.ltv {
  font-family:'Orbitron',sans-serif; font-size:8.5px; font-weight:700;
  color:var(--c); letter-spacing:.2px; line-height:1;
}
.ccg .ltv { color:var(--green) }
.ccp .ltv { color:var(--purple) }
.cco .ltv { color:var(--orange) }
.ccr .ltv { color:var(--red) }
.lcard.cur .ltv { color:var(--green) }

/* main content */
.lmain { flex:1; min-width:0 }
.lname {
  font-size:13.5px; font-weight:700; color:var(--ink); line-height:1.38;
  margin-bottom:7px; letter-spacing:-.1px;
  transition:color .3s;
}
.lcard:hover .lname { color:#fff }

/* ── badges ── */
.lbadges { display:flex; flex-wrap:wrap; gap:5px }
.badge {
  font-size:8.5px; font-weight:800; letter-spacing:.35px; text-transform:uppercase;
  padding:2px 8px; border-radius:5px;
  position:relative; overflow:hidden;
}
/* one-shot shimmer when card is hovered */
.badge::after {
  content:''; position:absolute; top:0; left:-110%; width:55%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
  transition:left .5s var(--ease);
}
.lcard:hover .badge::after { left:165% }
.btype { background:var(--cdim);            color:var(--c);      border:1px solid var(--stroke) }
.bgrp  { background:rgba(255,255,255,.035); color:var(--muted);  border:1px solid var(--stroke2) }
.blive {
  background:var(--g-dim); color:var(--green);
  border:1px solid rgba(0,255,140,.22);
  display:inline-flex; align-items:center; gap:4px;

/* live dot */
.ldot {
  width:5px; height:5px; border-radius:50%;
  background:var(--green);
  animation:liveDot 1.15s ease infinite;
}
@keyframes liveDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.45)} }

/* ── progress bar (inside card) ── */
.lprog { margin-top:11px }
.ptrack { height:2px; background:rgba(255,255,255,.05); border-radius:2px; overflow:hidden }
.pfill {
  height:100%;
  background:linear-gradient(90deg, var(--green), var(--c));
  border-radius:2px;
  transition:width 1.4s var(--ease);
  position:relative; overflow:hidden;
}
.pfill::after {
  content:''; position:absolute; top:0; left:-120%; width:55%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.32), transparent);

/* ── details (teacher / room) ── */

.ldets { display:flex; flex-direction:column; gap:6px }

════════════════════════════════════════════ */
.ftr {

@keyframes ftrIn { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

/* top edge shimmer */
.ftr::before {
  content:''; position:absolute; top:0; left:8%; right:8%; height:1px;

/* ════ CONSTANTS ════ */
const DAYS = ["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
const DS   = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const MOR  = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const MOU  = ["ЯНВ","ФЕВ","МАР","АПР","МАЙ","ИЮН","ИЮЛ","АВГ","СЕН","ОКТ","НОЯ","ДЕК"];
const WDU  = ["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"];
const START = new Date("2026-01-19T00:00:00+03:00");
const PD = 95; // lesson duration minutes

/* ════ STATE ════ */
let now = new Date();
let cW  = gwk(now);
let cD  = now.getDay() === 0 ? 6 : now.getDay() - 1;
let sW  = cW, sD = cD;

/* ════ HELPERS ════ */
function gwk(d){ return (Math.floor(Math.floor((d - START) / 86400000) / 7) % 2) + 1 }
function tm(t){ const [h,m] = t.split(":").map(Number); return h*60+m }
function pad(n){ return String(n).padStart(2,"0") }
function m2s(m){ return m >= 60 ? `${Math.floor(m/60)}ч ${m%60}мин` : `${m} мин` }

function getCur(ls){
  const c = now.getHours()*60 + now.getMinutes();
  for(const l of ls){ const s = tm(l.time); if(c >= s && c < s+PD) return {l, elapsed:c-s, left:PD-(c-s)} }
  return null;
}
function getNxt(ls){
  const c = now.getHours()*60 + now.getMinutes();
  for(const l of ls){ if(tm(l.time) > c) return l }
  return null;
}

function cc(n){
  const s = n.toLowerCase();
  if(s.includes("физическ") && s.includes("культ")) return "ccg";
  if(s.includes("математик") || s.includes("анализ"))     return "ccp";
  if(s.includes("политэкон") || s.includes("деньги") || (s.includes("орг") && s.includes("функц"))) return "cco";
  if(s.includes("духовн") || s.includes("нравств"))       return "ccr";
  return "";
}
function em(n){
  const s = n.toLowerCase();
  if(s.includes("физическ") && s.includes("культ")) return "🏃";
  if(s.includes("иностранный") || s.includes("язык")) return "🌐";
  if(s.includes("математик"))  return "📐";
  if(s.includes("физика"))     return "⚗️";
  if(s.includes("операционн")) return "💻";
  if(s.includes("алгоритмизац")) return "🖥️";
  if(s.includes("эвм") || (s.includes("орг") && s.includes("функц"))) return "📟";
  if(s.includes("политэкон") || s.includes("деньги")) return "💰";
  if(s.includes("инженерн"))   return "📏";
  if(s.includes("духовн"))     return "🕊️";
  return "📚";
}

/* ════ BANNER ════ */
function rBanner(){
  const w = document.getElementById("bWrap");
  if(sD !== cD || sW !== cW){ w.innerHTML = ""; return }
  const ls = (SCH[sW]||{})[sD] || [];
  const cr = getCur(ls), nx = getNxt(ls);
  let iconCls="bicon", chipH="", metaH="", progH="";

  if(cr){
    iconCls = "blicon";
    const pct = Math.min(100, Math.round((cr.elapsed / PD) * 100));
    chipH = `<div class="bchip live"><span class="ldot"></span>LIVE NOW</div>`;
    metaH = `<div class="bmeta gm">${em(cr.l.name)} <b>${cr.l.name.split(" ").slice(0,4).join(" ")}…</b><br>Осталось: <b>${m2s(cr.left)}</b></div>`;
    progH = `<div class="bprog"><div class="bptrack"><div class="bpfill" id="bpf" style="width:${pct}%"></div></div><div class="bplbl" id="bpl">${pct}% прошло · ${m2s(cr.left)} осталось</div></div>`;
  } else if(nx){
    const ml = tm(nx.time) - (now.getHours()*60 + now.getMinutes());
    chipH = `<div class="bchip">Сегодня</div>`;
    metaH = `<div class="bmeta">⏰ В <b>${nx.time}</b> — ${nx.name.split(" ").slice(0,3).join(" ")}…<br>Через <b>${m2s(ml)}</b></div>`;
  } else if(ls.length){
    chipH = `<div class="bchip">Сегодня</div>`;
    metaH = `<div class="bmeta">✅ Все пары завершены</div>`;
  } else {
    chipH = `<div class="bchip">Сегодня</div>`;
    metaH = `<div class="bmeta">🎉 Пар нет — свободен!</div>`;
  }

  w.innerHTML = `<div class="bnr"><div class="${iconCls}">📅</div><div class="bbody">${chipH}<div class="bday">${DAYS[sD]}</div>${metaH}${progH}</div><div class="bright"><div class="bclock" id="bClk">--:--</div><div class="bdate" id="bDt">-</div></div></div>`;
  uBT();
}

function uBT(){
  const c = document.getElementById("bClk"), d = document.getElementById("bDt");
  if(!c) return;
  c.textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
  d.textContent = WDU[now.getDay()] + " " + now.getDate() + " " + MOU[now.getMonth()];
}

/* ════ DAY TABS ════ */
function rDays(){
  const sc = document.getElementById("dScroll"); sc.innerHTML = "";
  for(let i = 0; i <= 6; i++){
    const iT = i === cD && sW === cW, iA = i === sD;
    const b = document.createElement("button");
    b.className = "dtab" + (iA ? " active" : "") + (iT ? " today-mark" : "");
    b.innerHTML = `<span class="dn">${DS[i]}</span><span class="dd"></span>`;
    b.style.animationDelay = (i * .042) + "s";
    b.onclick = () => {
      sD = i;
      sc.querySelectorAll(".dtab").forEach((el, idx) => {
        el.className = "dtab" + (idx===sD?" active":"") + (idx===cD&&sW===cW?" today-mark":"");
      });
      const sy = window.scrollY;
      rBanner(); rCont();
      window.scrollTo({top:sy, behavior:"instant"});
    };
    sc.appendChild(b);
  }
  const a = sc.querySelector(".active");
  if(a) setTimeout(() => a.scrollIntoView({inline:"center", behavior:"smooth"}), 80);
}

/* ════ CONTENT ════ */
function rCont(){
  const cont = document.getElementById("cont");
  const ls   = (SCH[sW]||{})[sD] || [];
  const isT  = sD === cD && sW === cW;
  const cr   = isT ? getCur(ls) : null;
  const curL = cr ? cr.l : null;
  const pl   = n => n===1 ? "пара" : n<5 ? "пары" : "пар";

  let h = `<div class="shead"><div class="sline"></div><div class="slbl">${DAYS[sD]} · ${sW}-я неделя</div>${ls.length ? `<div class="scnt">${ls.length} ${pl(ls.length)}</div>` : ""}<div class="sline"></div></div>`;

  if(!ls.length){
    h += `<div class="empty"><span class="eemoji">🎉</span><div class="etitle">Пар нет — отдыхаем!</div><div class="esub">Используй время продуктивно</div></div>`;
  } else {
    ls.forEach((l, i) => {
      const iC   = curL === l;
      const cls  = cc(l.name);
      const meta = [l.type, l.group].filter(Boolean).join(" · ");
      const tls  = l.teacher ? l.teacher.split("\n") : [];

      let progH = "";
      if(iC){
        const pct = Math.min(100, Math.round((cr.elapsed / PD) * 100));
        progH = `<div class="lprog"><div class="ptrack"><div class="pfill" style="width:${pct}%"></div></div><div class="plbls"><span class="plbl">${pct}% прошло</span><span class="plblr">осталось ${m2s(cr.left)}</span></div></div>`;
      }

      let detH = "";
      if(tls.length || l.room){
        const rows = [
          ...tls.map(t => `<div class="ldet"><span class="dic">👤</span><span>${t}</span></div>`),
          l.room ? `<div class="ldet"><span class="dic">📍</span><span>${l.room}</span></div>` : ""
        ].join("");
        detH = `<div class="ldiv"></div><div class="ldets">${rows}</div>`;
      }

      h += `<div class="lcard ${cls}${iC?" cur":""}" style="animation-delay:${.04+i*.068}s">` +
           `<div class="lbar"></div>` +
           `<div class="lbody">` +
             `<div class="ltop">` +
               `<div class="lnc"><div class="lnum">${i+1}</div><div class="ltv">${l.time}</div></div>` +
               `<div class="lmain">` +
                 `<div class="lname">${em(l.name)} ${l.name}</div>` +
                 `<div class="lbadges">` +
                   (meta ? `<span class="badge btype">${meta}</span>` : "") +
                   (iC   ? `<span class="badge blive"><span class="ldot"></span>LIVE</span>` : "") +
                 `</div>` +
                 progH + detH +
               `</div>` +
             `</div>` +
           `</div>` +
           `</div>`;
    });
  }
  cont.innerHTML = h;
}

/* ════ FOOTER STATUS ════ */
function rFtrStatus(){
  const ll = document.getElementById("fnLbl"), lv = document.getElementById("fnVal");
  if(!ll) return;
  const ls = (SCH[cW]||{})[cD] || [];
  const cr = getCur(ls), nx = getNxt(ls);
  if(cr){
    ll.textContent = "ИДЁТ ПАРА";
    lv.textContent = "осталось " + m2s(cr.left);
    lv.className = "fnval gv";
  } else if(nx){
    const ml = tm(nx.time) - (now.getHours()*60 + now.getMinutes());
    ll.textContent = "СЛЕДУЮЩАЯ";
    lv.textContent = nx.time + " · через " + m2s(ml);
    lv.className = "fnval";
  } else {
    ll.textContent = "СЕГОДНЯ";
    lv.textContent = "пары завершены";
    lv.className = "fnval";
  }
}

/* ════ CLOCK ════ */
function uClock(){
  now = new Date();
  document.getElementById("fTime").textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
  document.getElementById("fDate").textContent = WDU[now.getDay()] + " · " + now.getDate() + " " + MOR[now.getMonth()];
  const wt = gwk(now); cW = wt;
  document.getElementById("fWN").textContent   = wt + "-Я";
  document.getElementById("wPill").textContent = "WEEK " + wt;
  uBT(); rFtrStatus();
  const bpf = document.getElementById("bpf"), bpl = document.getElementById("bpl");
  if(bpf && sD === cD && sW === cW){
    const ls = (SCH[sW]||{})[sD] || [];
    const cr = getCur(ls);
    if(cr){
      const pct = Math.min(100, Math.round((cr.elapsed / PD) * 100));
      bpf.style.width = pct + "%";
      if(bpl) bpl.textContent = pct + "% прошло · " + m2s(cr.left) + " осталось";
    }
  }
}

/* ════ WEEK SWITCH ════ */
function selWeek(w){
  sW = w;
  document.getElementById("wT1").className = "wtab" + (w===1 ? " active" : "");
  document.getElementById("wT2").className = "wtab" + (w===2 ? " active" : "");
  render();
}

/* ════ RENDER ════ */
function render(){
  const sy = window.scrollY;
  rBanner(); rDays(); rCont();
  window.scrollTo({top:sy, behavior:"instant"});
}

/* ════ INIT ════ */
if(window.Telegram?.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand() }
uClock();
selWeek(sW);
setInterval(uClock, 10000);
setInterval(render,  60000);
</script>
