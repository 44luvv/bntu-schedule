<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Расписание БНТУ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a22;
    --card2: #22222e;
    --accent: #5e9fff;
    --green: #4cd97b;
    --red: #ff5e5e;
    --purple: #a78bfa;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --border: #2e2e3e;
    --pill-bg: #252530;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }
  .header-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .logo {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #1e3a5f, #2d5a9e);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .week-badge {
    margin-left: auto;
    background: var(--pill-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .week-badge b { color: var(--accent); }

  /* ── WEEK TABS ── */
  .week-tabs {
    display: flex; gap: 6px;
  }
  .week-tab {
    flex: 1; padding: 7px 0; border-radius: 10px;
    border: 1px solid var(--border); background: var(--pill-bg);
    color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .18s; text-align: center;
  }
  .week-tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }

  /* ── DAY TABS ── */
  .day-scroll {
    display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px;
    scrollbar-width: none;
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--pill-bg);
    color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .18s; white-space: nowrap;
  }
  .day-tab.active {
    background: var(--card2); border-color: var(--accent);
    color: var(--text);
  }
  .day-tab.today-mark {
    border-color: var(--green);
    color: var(--green);
  }
  .day-tab.today-mark.active {
    background: rgba(76,217,123,.15);
  }

  /* ── CONTENT ── */
  .content { padding: 4px 16px 80px; }

  /* ── DAY HEADER ── */
  .day-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 0 10px;
  }
  .day-header-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .day-header-dot.green { background: var(--green); }
  .day-name { font-size: 19px; font-weight: 700; }
  .day-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .no-lessons {
    margin-top: 20px;
    background: var(--card); border-radius: 16px; padding: 30px 20px;
    text-align: center;
  }
  .no-lessons .emoji { font-size: 40px; margin-bottom: 10px; }
  .no-lessons p { color: var(--muted); font-size: 15px; }

  /* ── LESSON CARD ── */
  .lesson-card {
    background: var(--card); border-radius: 16px;
    margin-bottom: 10px; overflow: hidden;
    border: 1px solid var(--border);
    transition: transform .12s;
  }
  .lesson-card:active { transform: scale(0.985); }
  .lesson-top {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 14px 10px;
  }
  .lesson-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    background: rgba(94,159,255,.12);
  }
  .lesson-icon.green-bg { background: rgba(76,217,123,.12); }
  .lesson-icon.purple-bg { background: rgba(167,139,250,.12); }
  .lesson-icon.orange-bg { background: rgba(255,165,80,.12); }
  .lesson-icon.red-bg { background: rgba(255,94,94,.12); }
  .lesson-num {
    position: absolute; top: -2px; left: -2px;
    background: var(--accent); color: #fff;
    width: 18px; height: 18px; border-radius: 6px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .lesson-icon-wrap { position: relative; flex-shrink: 0; }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-name {
    font-size: 14px; font-weight: 600; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lesson-type {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .lesson-time {
    font-size: 13px; font-weight: 700; color: var(--accent);
    white-space: nowrap; flex-shrink: 0;
  }
  .lesson-divider {
    height: 1px; background: var(--border); margin: 0 14px;
  }
  .lesson-bottom {
    padding: 9px 14px 12px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .lesson-detail {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: 12px; color: var(--muted);
  }
  .lesson-detail .d-icon { font-size: 13px; flex-shrink: 0; margin-top: 0; }
  .lesson-detail span { line-height: 1.4; }

  /* ── CURRENT LESSON highlight ── */
  .lesson-card.current {
    border-color: var(--green);
    box-shadow: 0 0 0 1px rgba(76,217,123,.3);
  }
  .now-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(76,217,123,.18); color: var(--green);
    border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700;
    margin-left: 8px; vertical-align: middle;
  }
  .now-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--green);
    animation: pulse 1.2s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .3; }
  }

  /* ── FOOTER TIME ── */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 10px 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-time { font-size: 20px; font-weight: 700; color: var(--text); }
  .footer-date { font-size: 11px; color: var(--muted); }
  .footer-week { font-size: 12px; color: var(--muted); text-align: right; }

  /* ── TRANSITIONS ── */
  .fade-in { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
</style>

const DAYS      = ["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
const DAYS_S    = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const START     = new Date("2026-01-19T00:00:00+03:00");
const PAIR_DUR  = 95; // минут

// ── Текущая неделя ────────────────────────────────────────────────────────────
function getWeekType(date) {
  const msDay = 86400000;
  const daysPassed = Math.floor((date - START) / msDay);
  return (Math.floor(daysPassed / 7) % 2) + 1;
}

// ── Иконка предмета ───────────────────────────────────────────────────────────
function lessonIcon(name) {
  const n = name.toLowerCase();
  if (n.includes("физическ культ") || n.includes("физкультур")) return {e:"🏃", c:"green-bg"};
  if (n.includes("иностранный") || n.includes("язык"))          return {e:"🌐", c:""};
  if (n.includes("математик"))                                   return {e:"📐", c:"purple-bg"};
  if (n.includes("физика"))                                      return {e:"⚗️", c:""};
  if (n.includes("операционн"))                                  return {e:"💻", c:""};
  if (n.includes("алгоритмизац"))                                return {e:"🖥️", c:""};
  if (n.includes("эвм") || n.includes("орг") && n.includes("функц")) return {e:"📟", c:"orange-bg"};
  if (n.includes("политэкон"))                                   return {e:"💰", c:"orange-bg"};
  if (n.includes("деньги"))                                      return {e:"💵", c:"orange-bg"};
  if (n.includes("инженерн"))                                    return {e:"📏", c:""};
  if (n.includes("духовн") || n.includes("нравств"))             return {e:"🕊️", c:"red-bg"};
  return {e:"📚", c:""};
}

// ── Состояние ─────────────────────────────────────────────────────────────────
let now       = new Date();
let curWeek   = getWeekType(now);
let curDay    = now.getDay() === 0 ? 0 : now.getDay() - 1; // 0=пн
if (curDay > 5) curDay = 0;
let selWeek   = curWeek;
let selDay    = curDay;

// ── Текущая пара ──────────────────────────────────────────────────────────────
function getCurrentLesson(lessons) {
  const h = now.getHours(), m = now.getMinutes();
  const cur = h * 60 + m;
  for (let l of lessons) {
    const [lh, lm] = l.time.split(":").map(Number);
    const start = lh * 60 + lm;
    if (cur >= start && cur < start + PAIR_DUR) return l;
  }
  return null;
}

// ── Рендер дней (таб) ─────────────────────────────────────────────────────────
function renderDayTabs() {
  const scroll = document.getElementById("dayScroll");
  scroll.innerHTML = "";
  for (let i = 0; i <= 5; i++) {
    const isToday  = i === curDay && selWeek === curWeek;
    const isActive = i === selDay;
    const lessons  = (SCHEDULE[selWeek] || {})[i] || [];
    const dot = lessons.length ? "" : " ·";
    const d = document.createElement("div");
    d.className = "day-tab" + (isActive ? " active" : "") + (isToday ? " today-mark" : "");
    d.textContent = DAYS_S[i] + (isToday ? " ●" : "");
    d.onclick = () => { selDay = i; render(); };
    scroll.appendChild(d);
  }
  // Скролл к активному дню
  const active = scroll.querySelector(".active");
  if (active) active.scrollIntoView({inline:"center", behavior:"smooth"});
}

// ── Рендер расписания ─────────────────────────────────────────────────────────

  const cont = document.getElementById("content");
  const lessons = (SCHEDULE[selWeek] || {})[selDay] || [];
  const isToday = selDay === curDay && selWeek === curWeek;
  const curLesson = isToday ? getCurrentLesson(lessons) : null;

  // Шапка дня
  let html = `<div class="day-header">
    <div class="day-header-dot ${isToday ? "green" : ""}"></div>
    <div>
      <div class="day-name">${DAYS[selDay]}${isToday ? " <span style='font-size:12px;color:var(--green);font-weight:500'>— сегодня</span>" : ""}</div>
      <div class="day-meta">${selWeek}-я учебная неделя${lessons.length ? " · " + lessons.length + " пар" + (lessons.length===1?"а":lessons.length<5?"ы":"") : ""}</div>
    </div>
  </div>`;

  if (!lessons.length) {
    html += `<div class="no-lessons fade-in">
      <div class="emoji">🎉</div>
      <p>Пар нет — отдыхаем!</p>
    </div>`;
  } else {
    lessons.forEach((l, i) => {
      const {e, c} = lessonIcon(l.name);
      const isCur  = curLesson === l;
      const meta   = [l.type, l.group].filter(Boolean).join("  ·  ");
      const teacherLines = l.teacher ? l.teacher.split("\n") : [];
      let bottomHTML = "";
      if (teacherLines.length) {
        bottomHTML += teacherLines.map(t =>
          `<div class="lesson-detail"><span class="d-icon">👤</span><span>${t.replace(/^[👤\s]+/,"")}</span></div>`
        ).join("");
      }
      if (l.room) {
        bottomHTML += `<div class="lesson-detail"><span class="d-icon">🏫</span><span>${l.room}</span></div>`;
      }

      html += `<div class="lesson-card${isCur ? " current" : ""} fade-in">
        <div class="lesson-top">
          <div class="lesson-icon-wrap">
            <div class="lesson-icon ${c}">${e}</div>
            <div class="lesson-num">${i+1}</div>
          </div>
          <div class="lesson-info">
            <div class="lesson-name">${l.name}${isCur ? '<span class="now-badge"><span class="now-dot"></span>Идёт</span>' : ""}</div>
            ${meta ? `<div class="lesson-type">${meta}</div>` : ""}
          </div>
          <div class="lesson-time">${l.time}</div>
        </div>
        ${bottomHTML ? `<div class="lesson-divider"></div><div class="lesson-bottom">${bottomHTML}</div>` : ""}
      </div>`;
    });
  }

  cont.innerHTML = html;
}

// ── Выбор недели ──────────────────────────────────────────────────────────────
function selectWeek(w) {
  selWeek = w;
  document.getElementById("wTab1").className = "week-tab" + (w===1?" active":"");
  document.getElementById("wTab2").className = "week-tab" + (w===2?" active":"");
  render();
}

// ── Полный рендер ─────────────────────────────────────────────────────────────
function render() {
  renderDayTabs();
  renderContent();
}

// ── Часы в футере ─────────────────────────────────────────────────────────────
function updateClock() {
  now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("footerTime").textContent = h + ":" + m;

  const days = ["вс","пн","вт","ср","чт","пт","сб"];
  const months = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
  document.getElementById("footerDate").textContent =
    days[now.getDay()] + ", " + now.getDate() + " " + months[now.getMonth()];

  const wt = getWeekType(now);
  document.getElementById("footerWeekInfo").innerHTML = `${wt}-я неделя`;
  document.getElementById("weekBadge").innerHTML = `Неделя <b>${wt}</b>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

updateClock();
selectWeek(selWeek);
setInterval(updateClock, 10000);
</script>
</body>
</html>
